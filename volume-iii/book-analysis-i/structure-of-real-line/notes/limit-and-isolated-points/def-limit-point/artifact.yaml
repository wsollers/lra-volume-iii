exposition:
  interpretation: 'Every punctured ball around a limit point meets $E$: the set accumulates
    at $x$. The strict inequality $0<|y-x|$ excludes $x$ itself, so $x$ need not belong
    to $E$ to be a limit point. This is the exact condition under which a sequence
    in $E$ can converge to $x$.'
