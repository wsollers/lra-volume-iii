exposition:
  interpretation: 'Compactness is a finiteness property phrased entirely in open sets:
    no matter how a set is covered by open pieces, finitely many already do the job.
    This is what later guarantees, on a compact domain, that continuous functions
    attain extrema and are uniformly continuous --- the facts Analysis~I relies on.
    Crucially, this definition does not mention order or boundedness, so it transfers
    unchanged to the torus.'
