exposition:
  interpretation: A bound controls the set from at least one side. It need not be sharp and need not belong to the set being bounded.
  exposition: []
  examples: []
  non_examples: []
  common_confusions:
    - Empty-set inapplicability must not be treated as actual failure of the bound condition.
    - In a partial order, x not less than or equal to b does not imply that b is strictly less than x.
