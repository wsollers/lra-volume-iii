statement:
  canonical_prose: A bound of a nonempty subset A of an ordered set is a candidate b in the ordered set that compares one-sidedly with every element of A, either as an upper bound or as a lower bound.
  canonical_latex: A\neq\varnothing\quad\text{and}\quad\bigl[(\forall x\in A)(x\leq b)\ \text{or}\ (\forall x\in A)(b\leq x)\bigr].
  semantic_ast:
    kind: and
    operands:
      - kind: predicate
        predicate_id: pred:is-nonempty
        arguments:
          - kind: variable
            binder_id: A
      - kind: or
        operands:
          - kind: forall
            binder:
              binder_id: x_upper
              symbol: x
              domain:
                kind: variable
                binder_id: A
            restriction: null
            body:
              kind: relation
              relation: \leq
              left:
                kind: variable
                binder_id: x_upper
              right:
                kind: variable
                binder_id: b
          - kind: forall
            binder:
              binder_id: x_lower
              symbol: x
              domain:
                kind: variable
                binder_id: A
            restriction: null
            body:
              kind: relation
              relation: \leq
              left:
                kind: variable
                binder_id: b
              right:
                kind: variable
                binder_id: x_lower
