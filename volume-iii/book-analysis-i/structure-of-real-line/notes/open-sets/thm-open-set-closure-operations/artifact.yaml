exposition:
  interpretation: 'Openness is preserved by arbitrary unions but only finite intersections.
    The infinite intersection $\bigcap_n(-1/n,1/n)=\{0\}$ shows why ``finite'''' cannot
    be dropped: a shrinking family of open intervals can close down onto a single
    point.'
