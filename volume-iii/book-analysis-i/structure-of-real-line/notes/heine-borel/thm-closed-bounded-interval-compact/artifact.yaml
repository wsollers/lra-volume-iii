exposition:
  interpretation: 'This is the hard half. The standard proof uses completeness directly:
    let $S$ be the set of $x\in[a,b]$ such that $[a,x]$ has a finite subcover, and
    show $\sup S=b$ is attained. Bisection (the nested-interval method) gives the
    same result. Either route shows completeness is what makes the line compact in
    the large.'
