exposition:
  interpretation: 'Heine--Borel is the bridge into Analysis~I: it certifies that the
    closed bounded sets --- the ones on which the Extreme Value and uniform-continuity
    theorems live --- are exactly the compact ones. It is stated here as the equivalence
    \emph{on $\mathbb{R}$}; the open-cover side is the definition that later carries
    to the torus, while ``closed and bounded'''' does not.'
