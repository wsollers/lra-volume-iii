    description: Failure is witnessed by the source negated quantified statement when
      present.
    minimal_failure_shape: '\begin{aligned}

      U \text{ is not open}

      &\Longleftrightarrow

      \exists x\in U\;\forall r>0\;(B_{r}(x)\not\subseteq U)\\

      &\Longleftrightarrow

      \exists x\in U\;\forall r>0\;\exists y\in\mathbb{R}\,

      \bigl(|x-y|<r\land y\notin U\bigr).

      \end{aligned}'
    source_failure_modes: "\\begin{description}\n  \\item[Exposition.]\n  Failure\
      \ is witnessed by a point of $U$ at which no positive-radius ball\n  remains\
      \ inside $U$.\n\n  \\item[\\operatorname{IsOpen}.]\n  \\[\n  U\\subseteq\\mathbb{R},\\\
      qquad\n  \\neg\\operatorname{IsOpen}(U,\\mathbb{R})\n  \\Longleftrightarrow\n\
      \  \\exists x\\in U\\;\\forall r>0\\;\\exists y\\in\\mathbb{R}\\,\n  \\bigl(|x-y|<r\\\
      land y\\notin U\\bigr).\n  \\]\n  The set $U$ fails to be open precisely when\
      \ there exists a point $x\\in U$\n  such that every positive-radius ball centered\
      \ at $x$ contains a point outside\n  $U$:\n\\[\n\\exists x\\in U\\;\\forall\
      \ r>0\\;\\exists y\\in\\mathbb{R}\\,\n\\bigl(|x-y|<r\\land y\\notin U\\bigr).\n\
      \\]\n  Thus failure consists of a witness point $x\\in U$, failure at every\
      \ radius\n  $r>0$, and for each such radius a witness $y\\notin U$ lying within\
      \ that\n  radius.\n\\end{description}"
  counterexample_shape: '\begin{aligned}

    U \text{ is not open}

    &\Longleftrightarrow

    \exists x\in U\;\forall r>0\;(B_{r}(x)\not\subseteq U)\\

    &\Longleftrightarrow

    \exists x\in U\;\forall r>0\;\exists y\in\mathbb{R}\,

    \bigl(|x-y|<r\land y\notin U\bigr).

    \end{aligned}'
