semantics:
  interpretation: A bound is a one-sided comparison witness; it need not be sharp and need not belong to the set being bounded.
failure_analysis:
  modes:
    - id: empty_set
      description: The source statement is framed for nonempty sets, so emptiness is recorded as an applicability failure.
      latex: A=\varnothing
    - id: neither_upper_nor_lower
      description: The candidate fails to control the set from either side.
      latex: (\exists x,y\in A)(b<x\ \text{and}\ y<b)
