semantics:
  witness_dependencies:
    - witness: x
      role: failure_of_upper_bound_condition
      depends_on:
        - A
        - b
        - '\leq'
    - witness: y
      role: failure_of_lower_bound_condition
      depends_on:
        - A
        - b
        - '\leq'
  vacuity_behavior:
    - condition: 'A=\varnothing'
      behavior: Both universal comparison clauses are vacuously true, but the source definition is inapplicable because nonemptiness is a standing assumption.
  definedness:
    mode: partial
    conditions:
      - 'A\subseteq S'
      - 'A\neq\varnothing'
      - 'b\in S'
    obligations: []
  uniqueness_conditions: []
  equality_cases:
    - A bound may belong to A, but membership in A is not required.
  edge_cases:
    - A candidate may satisfy both one-sided conditions, for example when A is a singleton containing b.
failure_analysis:
  applicability_failures:
    - id: applicability-empty-set
      condition: 'A=\varnothing'
      explanation: The source definition assumes that A is nonempty; emptiness is not part of the negation of the bound condition.
      predicate:
        kind: predicate
        predicate_id: pred:is-empty
        arguments:
          - kind: variable
            id: param-A
            binder_id: param-A
            parameter_id: param-A
            symbol: A
  statement_failure_modes:
    - id: failure-both-one-sided-conditions
      condition: '(\exists x\in A)(x\nleq b)\land(\exists y\in A)(b\nleq y)'
      explanation: The candidate fails to be a bound exactly when it fails both the upper-bound and lower-bound conditions.
      witnesses:
        - x
        - y
  counterexample_shape: A nonempty subset A with one witness not below b and one witness not above b; in a non-total order either witness may be incomparable with b.
