exposition:
  interpretation: This is the easy half of Heine--Borel and holds the same way in
    every metric space. Boundedness comes from covering $K$ by growing balls about
    a fixed point; closedness comes from separating an outside point from $K$ by disjoint
    balls. The converse --- closed and bounded implies compact --- is special to $\mathbb{R}^{n}$
    and is the next theorem.
