exposition:
  interpretation: Absolute value is not a separate idea from distance; it is the distance
    to the origin. The two-sided bound $|x|\le r \Leftrightarrow -r\le x\le r$ is
    then exactly the statement that $x$ lies within distance $r$ of $0$, i.e.\ in
    the interval $[-r,r]$.
